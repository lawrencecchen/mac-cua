name: CI

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt for Claude Code"
        required: false
        default: "Take a screenshot and describe what you see on the macOS desktop"
        type: string
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  issues: write
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.claude-code
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json', '.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install computer-use-mcp
        run: npm install -g computer-use-mcp

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Grant TCC permissions (Accessibility + Screen Recording)
        run: |
          # Get the bundle ID for the runner's terminal process
          # On GH Actions, the runner agent executes bash directly
          APPS=(
            "/usr/bin/bash"
            "/bin/bash"
            "/usr/bin/osascript"
            "/usr/sbin/screencapture"
          )

          for app in "${APPS[@]}"; do
            if [ -f "$app" ]; then
              echo "Granting TCC permissions for $app"
              # Accessibility (kTCCServiceAccessibility)
              sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
                "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier_type, flags) VALUES ('kTCCServiceAccessibility', '$app', 1, 2, 0, 1, 0, 0);" 2>/dev/null || true
              # Screen Recording (kTCCServiceScreenCapture)
              sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
                "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier_type, flags) VALUES ('kTCCServiceScreenCapture', '$app', 1, 2, 0, 1, 0, 0);" 2>/dev/null || true
            fi
          done

          # Also grant for Node.js
          NODE_PATH=$(which node)
          echo "Granting TCC permissions for $NODE_PATH"
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier_type, flags) VALUES ('kTCCServiceAccessibility', '$NODE_PATH', 1, 2, 0, 1, 0, 0);" 2>/dev/null || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier_type, flags) VALUES ('kTCCServiceScreenCapture', '$NODE_PATH', 1, 2, 0, 1, 0, 0);" 2>/dev/null || true

          echo "TCC permissions granted"

      - name: Verify display access
        run: |
          echo "macOS version: $(sw_vers -productVersion)"
          /usr/sbin/screencapture -x /tmp/test_screenshot.png && echo "screencapture works" || echo "screencapture failed"
          ls -la /tmp/test_screenshot.png || true

      - name: Create MCP config
        run: |
          cat > mcp.json << 'EOF'
          {
            "mcpServers": {
              "computer-use": {
                "command": "computer-use-mcp",
                "args": []
              }
            }
          }
          EOF

      - name: Install ffmpeg
        run: which ffmpeg || brew install ffmpeg

      - name: Start screen recording
        run: |
          # Use ffmpeg to record the macOS screen via AVFoundation
          # List devices to find the screen capture device index
          echo "Available capture devices:"
          ffmpeg -f avfoundation -list_devices true -i "" 2>&1 || true

          # Record screen (device index 0 = "Capture screen 0" on GH Actions macos-15)
          ffmpeg -f avfoundation -framerate 10 -capture_cursor 1 -i "0:none" \
            -c:v libx264 -preset ultrafast -crf 28 \
            -pix_fmt yuv420p \
            /tmp/screen-recording.mp4 </dev/null 2>/tmp/ffmpeg.log &
          echo $! > /tmp/recording-pid.txt
          echo "Screen recording started with ffmpeg (PID: $(cat /tmp/recording-pid.txt))"
          sleep 2
          # Verify it's running
          kill -0 $(cat /tmp/recording-pid.txt) 2>/dev/null && echo "ffmpeg is running" || { echo "ffmpeg failed to start:"; cat /tmp/ffmpeg.log; }

      - name: Run Claude Code with computer use
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CUA_SCREENSHOT_DIR: /tmp/cua-screenshots
        run: |
          mkdir -p /tmp/cua-screenshots
          claude -p \
            --mcp-config ./mcp.json \
            --allowedTools "mcp__computer-use__computer,Bash,Read,Write,Edit" \
            --max-turns 10 \
            --output-format stream-json \
            --verbose \
            "${{ inputs.prompt || 'Take a screenshot and describe what you see on the macOS desktop' }}" \
            2>/tmp/claude-stderr.txt | tee /tmp/claude-trajectory.jsonl

      - name: Stop screen recording
        if: always()
        run: |
          if [ -f /tmp/recording-pid.txt ]; then
            pid=$(cat /tmp/recording-pid.txt)
            kill -INT "$pid" 2>/dev/null || true
            # Wait for ffmpeg to finalize the mp4 (write moov atom)
            for i in $(seq 1 10); do
              kill -0 "$pid" 2>/dev/null || break
              sleep 1
            done
            echo "Screen recording stopped"
            ls -la /tmp/screen-recording.mp4 || { echo "No recording found. ffmpeg log:"; cat /tmp/ffmpeg.log 2>/dev/null; }
          fi

      - name: Collect transcript
        if: always()
        run: |
          if [ -f /tmp/cua-screenshots/transcript_path.txt ]; then
            TRANSCRIPT=$(cat /tmp/cua-screenshots/transcript_path.txt)
            if [ -f "$TRANSCRIPT" ]; then
              cp "$TRANSCRIPT" /tmp/claude-transcript.jsonl
              echo "Transcript copied ($(wc -l < /tmp/claude-transcript.jsonl) lines)"
            fi
          else
            find ~/.claude -name "*.jsonl" -newer /tmp/claude-trajectory.jsonl 2>/dev/null | head -1 | while read f; do
              cp "$f" /tmp/claude-transcript.jsonl
              echo "Found transcript at: $f"
            done
          fi

      - name: Push media to artifacts branch
        if: always()
        run: |
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          BRANCH="artifacts"
          DIR="runs/${RUN_ID}"

          # Clone bare to push to artifacts branch
          cd /tmp
          git clone --bare "https://x-access-token:${{ github.token }}@github.com/${REPO}.git" artifacts-repo
          cd artifacts-repo

          # Create orphan artifacts branch if it doesn't exist
          if ! git rev-parse --verify "${BRANCH}" 2>/dev/null; then
            # Create an empty orphan commit
            EMPTY_TREE=$(git hash-object -t tree /dev/null)
            COMMIT=$(echo "artifacts branch" | git commit-tree "$EMPTY_TREE")
            git update-ref "refs/heads/${BRANCH}" "$COMMIT"
          fi

          # Checkout artifacts branch in a worktree
          git worktree add /tmp/artifacts-work "${BRANCH}"
          cd /tmp/artifacts-work
          mkdir -p "${DIR}/screenshots"

          # Copy screenshots
          cp /tmp/cua-screenshots/*.png "${DIR}/screenshots/" 2>/dev/null || true
          cp /tmp/cua-screenshots/metadata.jsonl "${DIR}/" 2>/dev/null || true

          # Copy video
          cp /tmp/screen-recording.mp4 "${DIR}/recording.mp4" 2>/dev/null || true

          # Copy transcripts
          cp /tmp/claude-trajectory.jsonl "${DIR}/" 2>/dev/null || true
          cp /tmp/claude-transcript.jsonl "${DIR}/" 2>/dev/null || true

          git add .
          git -c user.name="github-actions" -c user.email="actions@github.com" \
            commit -m "Run ${RUN_ID} artifacts" || echo "Nothing to commit"
          git push origin "${BRANCH}"

          echo "Media pushed to ${BRANCH} branch at ${DIR}/"

      - name: Parse trajectory
        if: always()
        run: |
          echo "=== Trajectory Summary ==="
          cat /tmp/claude-trajectory.jsonl | while IFS= read -r line; do
            type=$(echo "$line" | jq -r '.type // empty' 2>/dev/null)
            case "$type" in
              assistant)
                echo "$line" | jq -r '
                  .message.content[]? |
                  if .type == "tool_use" then
                    "TOOL CALL: \(.name)\n   Input: \(.input | tostring | .[0:500])\n"
                  elif .type == "text" then
                    "ASSISTANT: \(.text | .[0:500])\n"
                  else empty end
                ' 2>/dev/null
                ;;
              result)
                echo "$line" | jq -r '"RESULT: \(.result | .[0:1000])"' 2>/dev/null
                ;;
            esac
          done
          echo ""
          echo "Screenshots: $(ls /tmp/cua-screenshots/*.png 2>/dev/null | wc -l | tr -d ' ')"

      - name: Upload trajectory artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-trajectory-${{ github.run_id }}
          path: |
            /tmp/claude-trajectory.jsonl
            /tmp/claude-transcript.jsonl
            /tmp/claude-stderr.txt
            /tmp/screen-recording.mp4
            /tmp/cua-screenshots/

      - name: Create issue with output
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.run_id }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN_ID}"
          RAW="https://raw.githubusercontent.com/${{ github.repository }}/artifacts/runs/${RUN_ID}"

          # Build issue body
          {
            echo "**Triggered by:** ${{ github.actor }}"
            echo "**Prompt:** ${{ inputs.prompt }}"
            echo "**Run:** ${RUN_URL}"
            echo ""
            echo "## Screen Recording"
            echo ""
            echo '<video src="https://github.com/${{ github.repository }}/blob/artifacts/runs/'"${RUN_ID}"'/recording.mp4?raw=true" controls autoplay muted loop></video>'
            echo ""
            echo "## Trajectory"
            echo ""

            # Track tool call index for pairing with screenshots
            step=0
            cat /tmp/claude-trajectory.jsonl | while IFS= read -r line; do
              type=$(echo "$line" | jq -r '.type // empty' 2>/dev/null)
              case "$type" in
                assistant)
                  echo "$line" | jq -r '
                    .message.content[]? |
                    if .type == "tool_use" then
                      "**Tool Call:** `\(.name)`\n\n```json\n\(.input | tojson | .[0:1000])\n```\n"
                    elif .type == "text" then
                      "\(.text)\n"
                    else empty end
                  ' 2>/dev/null

                  # For each tool_use block, embed pre/post screenshots in a table
                  tool_use_ids=$(echo "$line" | jq -r '.message.content[]? | select(.type == "tool_use") | .id' 2>/dev/null)
                  for tid in $tool_use_ids; do
                    tid_short="${tid:0:12}"
                    pre=$(ls /tmp/cua-screenshots/*_pre_*_${tid_short}.png 2>/dev/null | head -1)
                    post=$(ls /tmp/cua-screenshots/*_post_*_${tid_short}.png 2>/dev/null | head -1)
                    if [ -n "$pre" ] || [ -n "$post" ]; then
                      echo ""
                      echo "| Before | After |"
                      echo "|--------|-------|"
                      pre_cell=""
                      post_cell=""
                      if [ -n "$pre" ]; then
                        pre_cell="![pre](${RAW}/screenshots/$(basename "$pre"))"
                      fi
                      if [ -n "$post" ]; then
                        post_cell="![post](${RAW}/screenshots/$(basename "$post"))"
                      fi
                      echo "| ${pre_cell} | ${post_cell} |"
                      echo ""
                    fi
                  done
                  ;;
                result)
                  echo "$line" | jq -r '"---\n**Final Result:**\n\(.result | .[0:2000])"' 2>/dev/null
                  ;;
              esac
            done

            echo ""
            echo "## Raw Data"
            echo ""
            echo "- [Claude Code transcript](${RAW}/claude-transcript.jsonl)"
            echo "- [Stream trajectory](${RAW}/claude-trajectory.jsonl)"
            echo "- [Screenshot metadata](${RAW}/metadata.jsonl)"
            echo "- [Download all artifacts](${RUN_URL}#artifacts)"
          } | head -c 60000 > /tmp/issue-body.md

          gh issue create \
            --title "CUA run ${RUN_ID}" \
            --body-file /tmp/issue-body.md
