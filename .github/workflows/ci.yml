name: CI

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt for Claude Code"
        required: false
        default: "Take a screenshot and describe what you see on the macOS desktop"
        type: string
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  issues: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.claude-code
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json', '.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install computer-use-mcp
        run: npm install -g computer-use-mcp

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Grant TCC permissions (Accessibility + Screen Recording)
        run: |
          # Get the bundle ID for the runner's terminal process
          # On GH Actions, the runner agent executes bash directly
          APPS=(
            "/usr/bin/bash"
            "/bin/bash"
            "/usr/bin/osascript"
            "/usr/sbin/screencapture"
          )

          for app in "${APPS[@]}"; do
            if [ -f "$app" ]; then
              echo "Granting TCC permissions for $app"
              # Accessibility (kTCCServiceAccessibility)
              sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
                "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier_type, flags) VALUES ('kTCCServiceAccessibility', '$app', 1, 2, 0, 1, 0, 0);" 2>/dev/null || true
              # Screen Recording (kTCCServiceScreenCapture)
              sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
                "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier_type, flags) VALUES ('kTCCServiceScreenCapture', '$app', 1, 2, 0, 1, 0, 0);" 2>/dev/null || true
            fi
          done

          # Also grant for Node.js
          NODE_PATH=$(which node)
          echo "Granting TCC permissions for $NODE_PATH"
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier_type, flags) VALUES ('kTCCServiceAccessibility', '$NODE_PATH', 1, 2, 0, 1, 0, 0);" 2>/dev/null || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier_type, flags) VALUES ('kTCCServiceScreenCapture', '$NODE_PATH', 1, 2, 0, 1, 0, 0);" 2>/dev/null || true

          echo "TCC permissions granted"

      - name: Verify display access
        run: |
          echo "macOS version: $(sw_vers -productVersion)"
          /usr/sbin/screencapture -x /tmp/test_screenshot.png && echo "screencapture works" || echo "screencapture failed"
          ls -la /tmp/test_screenshot.png || true

      - name: Create MCP config
        run: |
          cat > mcp.json << 'EOF'
          {
            "mcpServers": {
              "computer-use": {
                "command": "computer-use-mcp",
                "args": []
              }
            }
          }
          EOF

      - name: Start screen recording
        run: |
          # screencapture -v records video, -V sets duration (we'll kill it later)
          # Use -G to record without showing in dock, -x for no sounds
          /usr/sbin/screencapture -v -x /tmp/screen-recording.mov &
          echo $! > /tmp/screencapture-pid.txt
          echo "Screen recording started (PID: $(cat /tmp/screencapture-pid.txt))"
          sleep 1

      - name: Run Claude Code with computer use
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p \
            --mcp-config ./mcp.json \
            --allowedTools "mcp__computer-use__computer,Bash,Read,Write,Edit" \
            --max-turns 10 \
            --output-format stream-json \
            --verbose \
            "${{ inputs.prompt || 'Take a screenshot and describe what you see on the macOS desktop' }}" \
            2>/tmp/claude-stderr.txt | tee /tmp/claude-trajectory.jsonl

      - name: Stop screen recording
        if: always()
        run: |
          if [ -f /tmp/screencapture-pid.txt ]; then
            pid=$(cat /tmp/screencapture-pid.txt)
            # Send SIGINT to gracefully stop recording (finalizes the .mov file)
            kill -INT "$pid" 2>/dev/null || true
            sleep 2
            echo "Screen recording stopped"
            ls -la /tmp/screen-recording.mov || echo "No recording file found"
          fi

      - name: Parse trajectory
        if: always()
        run: |
          echo "=== Trajectory Summary ==="
          echo ""

          # Show each step: tool calls, results, and assistant messages
          cat /tmp/claude-trajectory.jsonl | while IFS= read -r line; do
            type=$(echo "$line" | jq -r '.type // empty' 2>/dev/null)
            case "$type" in
              assistant)
                # Show tool use blocks
                echo "$line" | jq -r '
                  .message.content[]? |
                  if .type == "tool_use" then
                    "🔧 TOOL CALL: \(.name)\n   Input: \(.input | tostring | .[0:500])\n"
                  elif .type == "text" then
                    "💬 ASSISTANT: \(.text | .[0:500])\n"
                  else empty end
                ' 2>/dev/null
                ;;
              result)
                # Show final result
                echo "$line" | jq -r '
                  "✅ RESULT: \(.result | .[0:1000])"
                ' 2>/dev/null
                ;;
            esac
          done

          echo ""
          echo "=== Full trajectory JSONL available as artifact ==="

      - name: Upload trajectory artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-trajectory-${{ github.run_id }}
          path: |
            /tmp/claude-trajectory.jsonl
            /tmp/claude-stderr.txt
            /tmp/screen-recording.mov

      - name: Create issue with output
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Build issue body as a file to avoid escaping issues
          {
            echo "**Triggered by:** ${{ github.actor }}"
            echo "**Prompt:** ${{ inputs.prompt }}"
            echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "## Trajectory"
            echo ""

            cat /tmp/claude-trajectory.jsonl | while IFS= read -r line; do
              type=$(echo "$line" | jq -r '.type // empty' 2>/dev/null)
              case "$type" in
                assistant)
                  echo "$line" | jq -r '
                    .message.content[]? |
                    if .type == "tool_use" then
                      "**Tool Call:** `\(.name)`\n\n```json\n\(.input | tojson | .[0:1000])\n```\n"
                    elif .type == "text" then
                      "\(.text)\n"
                    else empty end
                  ' 2>/dev/null
                  ;;
                result)
                  echo "$line" | jq -r '"---\n**Final Result:**\n\(.result | .[0:2000])"' 2>/dev/null
                  ;;
              esac
            done
          } | head -c 60000 > /tmp/issue-body.md

          gh issue create \
            --title "CUA run ${{ github.run_id }}" \
            --body-file /tmp/issue-body.md
