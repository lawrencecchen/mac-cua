name: CI

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt for Claude Code"
        required: false
        default: "Take a screenshot and describe what you see on the macOS desktop"
        type: string
      macos_version:
        description: "macOS runner version"
        required: false
        default: "15"
        type: choice
        options:
          - "15"
          - "26"
      max_turns:
        description: "Max agentic turns for Claude Code"
        required: false
        default: "100"
        type: string
      model:
        description: "Claude model to use"
        required: false
        default: "claude-opus-4-6"
        type: choice
        options:
          - "claude-opus-4-6"
          - "claude-sonnet-4-6"
          - "claude-haiku-4-5-20251001"
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  issues: write
  contents: write

jobs:
  build:
    runs-on: macos-${{ inputs.macos_version || '15' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Setup environment
        run: |
          # Run all installs, TCC grants, and config in parallel

          # 1. npm installs (background)
          npm install -g computer-use-mcp @anthropic-ai/claude-code &
          NPM_PID=$!

          # 2. ffmpeg install (background)
          (which ffmpeg || brew install ffmpeg) &
          FFMPEG_PID=$!

          # 3. TCC grants for system binaries (immediate, no deps)
          grant_tcc() {
            local app="$1" svc="$2" db="$3"
            local cmd="INSERT OR REPLACE INTO access VALUES('$svc','$app',1,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,CAST(strftime('%s','now') AS INTEGER));"
            if [ "$db" = "/Library/Application Support/com.apple.TCC/TCC.db" ]; then
              sudo sqlite3 "$db" "$cmd" 2>/dev/null || true
            else
              sqlite3 "$db" "$cmd" 2>/dev/null || true
            fi
          }
          SYSTEM_APPS=("/usr/bin/bash" "/bin/bash" "/usr/bin/osascript" "/usr/sbin/screencapture")
          SERVICES=("kTCCServiceAccessibility" "kTCCServiceScreenCapture")
          for app in "${SYSTEM_APPS[@]}"; do
            if [ -f "$app" ]; then
              for svc in "${SERVICES[@]}"; do
                grant_tcc "$app" "$svc" "/Library/Application Support/com.apple.TCC/TCC.db"
                grant_tcc "$app" "$svc" "$HOME/Library/Application Support/com.apple.TCC/TCC.db"
              done
            fi
          done

          # 4. Suppress screen capture nag dialog for system binaries
          PLIST="$HOME/Library/Group Containers/group.com.apple.replayd/ScreenCaptureApprovals.plist"
          mkdir -p "$(dirname "$PLIST")"
          FUTURE="$(date -j -v+100y +'%Y-%m-%d %H:%M:%S +0000')"
          for app in "${SYSTEM_APPS[@]}"; do
            if [ -f "$app" ]; then
              /usr/bin/defaults write "$PLIST" "$app" -dict \
                kScreenCaptureApprovalLastAlerted -date "$FUTURE" \
                kScreenCaptureApprovalLastUsed -date "$FUTURE" 2>/dev/null || \
              /usr/bin/defaults write "$PLIST" "$app" -date "$FUTURE" 2>/dev/null || true
            fi
          done

          # 5. Create MCP config (no deps)
          cat > mcp.json << 'MCPEOF'
          {
            "mcpServers": {
              "computer-use": {
                "command": "computer-use-mcp",
                "args": []
              }
            }
          }
          MCPEOF

          # Wait for installs to finish
          wait $NPM_PID
          echo "npm installs done"
          wait $FFMPEG_PID
          echo "ffmpeg ready"

          # 6. TCC + dialog suppression for installed binaries (node, ffmpeg)
          for bin in node ffmpeg; do
            p=$(which "$bin" 2>/dev/null || true)
            if [ -n "$p" ]; then
              for svc in "${SERVICES[@]}"; do
                grant_tcc "$p" "$svc" "/Library/Application Support/com.apple.TCC/TCC.db"
                grant_tcc "$p" "$svc" "$HOME/Library/Application Support/com.apple.TCC/TCC.db"
              done
              /usr/bin/defaults write "$PLIST" "$p" -dict \
                kScreenCaptureApprovalLastAlerted -date "$FUTURE" \
                kScreenCaptureApprovalLastUsed -date "$FUTURE" 2>/dev/null || true
            fi
          done

          sudo killall tccd 2>/dev/null || true
          killall -HUP replayd 2>/dev/null || true
          killall -u "$USER" cfprefsd 2>/dev/null || true

          echo "Environment ready"

      - name: Start screen recording
        run: |
          ffmpeg -f avfoundation -framerate 10 -capture_cursor 1 -i "0:none" \
            -c:v libx264 -preset ultrafast -crf 28 \
            -pix_fmt yuv420p \
            /tmp/screen-recording.mp4 </dev/null 2>/tmp/ffmpeg.log &
          echo $! > /tmp/recording-pid.txt
          sleep 2
          kill -0 $(cat /tmp/recording-pid.txt) 2>/dev/null && echo "Recording started (PID: $(cat /tmp/recording-pid.txt))" || { echo "ffmpeg failed:"; cat /tmp/ffmpeg.log; }

      - name: Run Claude Code with computer use
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CUA_SCREENSHOT_DIR: /tmp/cua-screenshots
        run: |
          mkdir -p /tmp/cua-screenshots
          claude -p \
            --model ${{ inputs.model || 'claude-opus-4-6' }} \
            --mcp-config ./mcp.json \
            --allowedTools "mcp__computer-use__computer,Bash,Read,Write,Edit" \
            --max-turns ${{ inputs.max_turns || '100' }} \
            --output-format stream-json \
            --verbose \
            "${{ inputs.prompt || 'Take a screenshot and describe what you see on the macOS desktop' }}" \
            2>/tmp/claude-stderr.txt | tee /tmp/claude-trajectory.jsonl

      - name: Stop screen recording
        if: always()
        run: |
          if [ -f /tmp/recording-pid.txt ]; then
            pid=$(cat /tmp/recording-pid.txt)
            kill -INT "$pid" 2>/dev/null || true
            # Wait for ffmpeg to finalize the mp4 (write moov atom)
            for i in $(seq 1 10); do
              kill -0 "$pid" 2>/dev/null || break
              sleep 1
            done
            echo "Screen recording stopped"
            ls -la /tmp/screen-recording.mp4 || { echo "No recording found. ffmpeg log:"; cat /tmp/ffmpeg.log 2>/dev/null; }
          fi

      - name: Collect transcript
        if: always()
        run: |
          if [ -f /tmp/cua-screenshots/transcript_path.txt ]; then
            TRANSCRIPT=$(cat /tmp/cua-screenshots/transcript_path.txt)
            if [ -f "$TRANSCRIPT" ]; then
              cp "$TRANSCRIPT" /tmp/claude-transcript.jsonl
              echo "Transcript copied ($(wc -l < /tmp/claude-transcript.jsonl) lines)"
            fi
          else
            find ~/.claude -name "*.jsonl" -newer /tmp/claude-trajectory.jsonl 2>/dev/null | head -1 | while read f; do
              cp "$f" /tmp/claude-transcript.jsonl
              echo "Found transcript at: $f"
            done
          fi

      - name: Push media to artifacts branch
        if: always()
        run: |
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          BRANCH="artifacts"
          DIR="runs/${RUN_ID}"

          # Clone bare to push to artifacts branch
          cd /tmp
          git clone --bare "https://x-access-token:${{ github.token }}@github.com/${REPO}.git" artifacts-repo
          cd artifacts-repo

          # Create orphan artifacts branch if it doesn't exist
          if ! git rev-parse --verify "${BRANCH}" 2>/dev/null; then
            # Create an empty orphan commit
            EMPTY_TREE=$(git hash-object -t tree /dev/null)
            COMMIT=$(echo "artifacts branch" | git commit-tree "$EMPTY_TREE")
            git update-ref "refs/heads/${BRANCH}" "$COMMIT"
          fi

          # Checkout artifacts branch in a worktree
          git worktree add /tmp/artifacts-work "${BRANCH}"
          cd /tmp/artifacts-work
          mkdir -p "${DIR}/screenshots"

          # Only push screenshots (needed for inline rendering in issue body)
          # JSON/transcripts/video are in Actions artifacts only
          cp /tmp/cua-screenshots/*.png "${DIR}/screenshots/" 2>/dev/null || true

          git add .
          git -c user.name="github-actions" -c user.email="actions@github.com" \
            commit -m "Run ${RUN_ID} artifacts" || echo "Nothing to commit"
          git push origin "${BRANCH}"

          echo "Media pushed to ${BRANCH} branch at ${DIR}/"

      - name: Parse trajectory
        if: always()
        run: |
          echo "=== Trajectory Summary ==="
          cat /tmp/claude-trajectory.jsonl | while IFS= read -r line; do
            type=$(echo "$line" | jq -r '.type // empty' 2>/dev/null)
            case "$type" in
              assistant)
                echo "$line" | jq -r '
                  .message.content[]? |
                  if .type == "tool_use" then
                    "TOOL CALL: \(.name)\n   Input: \(.input | tostring | .[0:500])\n"
                  elif .type == "text" then
                    "ASSISTANT: \(.text | .[0:500])\n"
                  else empty end
                ' 2>/dev/null
                ;;
              result)
                echo "$line" | jq -r '"RESULT: \(.result | .[0:1000])"' 2>/dev/null
                ;;
            esac
          done
          echo ""
          echo "Screenshots: $(ls /tmp/cua-screenshots/*.png 2>/dev/null | wc -l | tr -d ' ')"

      - name: Upload trajectory artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-trajectory-${{ github.run_id }}
          path: |
            /tmp/claude-trajectory.jsonl
            /tmp/claude-transcript.jsonl
            /tmp/claude-stderr.txt
            /tmp/screen-recording.mp4
            /tmp/cua-screenshots/

      - name: Prepare video embed
        if: always() && github.event_name == 'workflow_dispatch'
        run: |
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          VIDEO_MD_FILE=$(mktemp)

          if [ -f /tmp/screen-recording.mp4 ]; then
            # Link to the actions run artifacts page where the mp4 can be downloaded
            echo "[Download screen recording (artifacts)](https://github.com/${REPO}/actions/runs/${RUN_ID}#artifacts)" > "$VIDEO_MD_FILE"
          else
            echo "_No recording available_" > "$VIDEO_MD_FILE"
          fi

          echo "VIDEO_MD_FILE=${VIDEO_MD_FILE}" >> "$GITHUB_ENV"

      - name: Create issue with output
        if: always() && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.run_id }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN_ID}"
          RAW="https://raw.githubusercontent.com/${{ github.repository }}/artifacts/runs/${RUN_ID}"

          # Build issue body
          {
            echo "**Triggered by:** ${{ github.actor }}"
            echo "**Prompt:** ${{ inputs.prompt }}"
            echo "**Run:** ${RUN_URL}"
            echo ""
            echo "## Screen Recording"
            echo ""
            if [ -f "$VIDEO_MD_FILE" ]; then
              cat "$VIDEO_MD_FILE"
            else
              echo "_No recording available_"
            fi
            echo ""
            echo "## Trajectory"
            echo ""

            # Track tool call index for pairing with screenshots
            step=0
            cat /tmp/claude-trajectory.jsonl | while IFS= read -r line; do
              type=$(echo "$line" | jq -r '.type // empty' 2>/dev/null)
              case "$type" in
                assistant)
                  echo "$line" | jq -r '
                    .message.content[]? |
                    if .type == "tool_use" then
                      "**Tool Call:** `\(.name)`\n\n```json\n\(.input | tojson | .[0:1000])\n```\n"
                    elif .type == "text" then
                      "\(.text)\n"
                    else empty end
                  ' 2>/dev/null

                  # For each tool_use block, embed pre/post screenshots in a table
                  tool_use_ids=$(echo "$line" | jq -r '.message.content[]? | select(.type == "tool_use") | .id' 2>/dev/null)
                  for tid in $tool_use_ids; do
                    tid_short="${tid:0:12}"
                    pre=$(ls /tmp/cua-screenshots/*_pre_*_${tid_short}.png 2>/dev/null | head -1)
                    post=$(ls /tmp/cua-screenshots/*_post_*_${tid_short}.png 2>/dev/null | head -1)
                    if [ -n "$pre" ] || [ -n "$post" ]; then
                      echo ""
                      echo "| Before | After |"
                      echo "|--------|-------|"
                      pre_cell=""
                      post_cell=""
                      if [ -n "$pre" ]; then
                        pre_cell="![pre](${RAW}/screenshots/$(basename "$pre"))"
                      fi
                      if [ -n "$post" ]; then
                        post_cell="![post](${RAW}/screenshots/$(basename "$post"))"
                      fi
                      echo "| ${pre_cell} | ${post_cell} |"
                      echo ""
                    fi
                  done
                  ;;
                result)
                  echo "$line" | jq -r '"---\n**Final Result:**\n\(.result | .[0:2000])"' 2>/dev/null
                  ;;
              esac
            done

            echo ""
            echo "## Raw Data"
            echo ""
            echo "- [Download all artifacts (transcript, trajectory, screenshots, video)](${RUN_URL}#artifacts)"
          } | head -c 60000 > /tmp/issue-body.md

          gh issue create \
            --title "CUA run ${RUN_ID}" \
            --body-file /tmp/issue-body.md
